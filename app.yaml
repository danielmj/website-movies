name: movies
project: movies
compose: docker-compose.yml

env:
  required:
    - NODE_ENV
    - APP_MYSQL_PASSWORD
    - MOVIES_SESSION_SECRET
    - TMDB_API_KEY
    - OMDB_API_KEY
  optional:
    # Sign in with Google. If unset, /api/auth/google is disabled and the
    # Google button on the Login page just isn't shown — email + password
    # still works.
    - MOVIES_GOOGLE_CLIENT_ID

mysql:
  databases:
    - database: movies
      user: app
      password_env: APP_MYSQL_PASSWORD

local:
  infra:
    - mysql
  setup:
    - name: init-db
      dir: server
      command: npm run init-db
  processes:
    - name: api
      dir: server
      command: npm run dev
    # Vite reads VITE_* vars at dev-server start; we translate the
    # MOVIES-namespaced shared secret into VITE_GOOGLE_CLIENT_ID inline.
    - name: web
      dir: app
      command: VITE_GOOGLE_CLIENT_ID="${MOVIES_GOOGLE_CLIENT_ID:-}" npm run dev

deploy:
  setup:
    - name: init-db
      service: movies-api
      command: node src/init-db.js
