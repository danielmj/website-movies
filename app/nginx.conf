server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Google Identity Services posts the credential back from its popup —
  # the default COOP would block that. `same-origin-allow-popups` keeps the
  # rest of the app cross-origin-isolated while permitting GIS interop.
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

  location /api/ {
    proxy_pass http://movies-api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_request_headers on;
  }

  location / {
    try_files $uri /index.html;
  }
}
